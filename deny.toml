[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
ignore = [
    { crate = "atomic-polyfill", reason = "transitive dep via heapless; not directly used" },
    { crate = "number_prefix", reason = "transitive dep via indicatif; not directly used" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
deny = []
skip-tree = [
    { crate = "windows-sys", reason = "foundational crate, multiple versions unavoidable across transitive deps" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
