[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
ignore = [
    # OpenDAL transitive deps — we don't control these
    { id = "RUSTSEC-2025-0024", reason = "quick-xml is transitive via opendal; XML parsing paths unused in packt" },
    { id = "RUSTSEC-2025-0034", reason = "quick-xml is transitive via opendal; namespace parsing unused" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "Zlib",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
deny = []
skip-tree = [
    { crate = "windows-sys", reason = "foundational crate, multiple versions unavoidable across transitive deps" },
    # OpenDAL brings a massive dep tree with unavoidable duplicate versions
    { crate = "opendal", reason = "OpenDAL ecosystem — multiple versions of crypto/encoding crates from different providers" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
